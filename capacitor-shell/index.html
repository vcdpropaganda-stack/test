<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>VLservice Android</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f1e7;
        color: #1f2937;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(188, 149, 92, 0.18), transparent 40%),
          linear-gradient(180deg, #f8f4ec 0%, #efe7da 100%);
      }

      main {
        width: min(100%, 420px);
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(31, 41, 55, 0.08);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }

      code {
        padding: 2px 6px;
        border-radius: 999px;
        background: #f3f4f6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Android pronto para conectar</h1>
      <p>
        Defina <code>CAPACITOR_SERVER_URL</code> ou <code>NEXT_PUBLIC_SITE_URL</code>
        antes de sincronizar o projeto Android.
      </p>
      <p>
        Para testar no emulador com o servidor local, use
        <code>http://10.0.2.2:3000</code>.
      </p>
    </main>
  </body>
</html>
